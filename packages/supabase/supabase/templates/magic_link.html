<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in to Job Application Tracker</title>
</head>
<body style="margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: #f9fafb; color: #111827;">
    <table align="center" border="0" cellpadding="0" cellspacing="0" width="100%" style="max-width: 600px; margin: 40px auto; background-color: #ffffff; border-radius: 8px; box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06); overflow: hidden; border: 1px solid #e5e7eb;">
        <tr>
            <td style="padding: 40px 32px; text-align: center;">
                <h1 style="margin: 0 0 16px 0; font-size: 24px; font-weight: 700; color: #111827; letter-spacing: -0.025em;">Job Application Tracker</h1>
                <p style="margin: 0 0 32px 0; font-size: 16px; line-height: 24px; color: #4b5563;">
                    Click the button below to sign in to your account. This link will expire shortly.
                </p>
                <a href="{{ .SiteURL }}/auth/confirm?token_hash={{ .TokenHash }}&type=email" style="display: inline-block; padding: 12px 32px; font-size: 16px; font-weight: 600; color: #193100; text-decoration: none; background-color: #a2e33c; border-radius: 6px; transition: background-color 0.2s;">
                    Sign in to Dashboard
                </a>
                <p style="margin: 32px 0 0 0; font-size: 14px; line-height: 20px; color: #6b7280;">
                    If you didn't request this email, you can safely ignore it.
                </p>
            </td>
        </tr>
        <tr>
            <td style="padding: 24px 32px; background-color: #f9fafb; border-top: 1px solid #e5e7eb; text-align: center;">
                <p style="margin: 0; font-size: 12px; color: #9ca3af;">
                    &copy; 2026 Job Application Tracker. All rights reserved.
                </p>
            </td>
        </tr>
    </table>
</body>
</html>
